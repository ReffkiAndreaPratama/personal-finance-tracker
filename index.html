<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinTrack — Personal Finance Tracker</title>
  <link rel="stylesheet" href="src/styles/main.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="8" fill="#3B82F6"/>
            <path d="M7 14h14M14 7v14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
          <span>FinTrack</span>
        </div>
        <div class="header-actions">
          <div class="date-filter-group">
            <select id="dateFilter" class="select-input">
              <option value="all">All Time</option>
              <option value="week">This Week</option>
              <option value="month" selected>This Month</option>
              <option value="year">This Year</option>
            </select>
          </div>
          <button id="exportBtn" class="btn btn-outline" title="Export CSV">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
            </svg>
            Export
          </button>
          <button id="themeToggle" class="btn btn-icon" title="Toggle dark mode">
            <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="main-content">
      <!-- Summary Cards -->
      <section id="summary" class="summary-section"></section>

      <!-- Smart Insight Banner -->
      <div id="insightBanner" class="insight-banner hidden">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="insightText"></span>
      </div>

      <!-- Main Grid -->
      <div class="main-grid">
        <!-- Left Column -->
        <div class="left-col">
          <!-- Add Transaction Form -->
          <div class="card" id="formCard">
            <div class="card-header">
              <h2 class="card-title">Add Transaction</h2>
              <div class="type-toggle">
                <button class="type-btn active" data-type="expense">Expense</button>
                <button class="type-btn" data-type="income">Income</button>
              </div>
            </div>
            <form id="transactionForm" class="form" novalidate>
              <input type="hidden" id="transactionType" value="expense" />
              <div class="form-row">
                <div class="form-group">
                  <label for="amount">Amount</label>
                  <div class="input-prefix">
                    <span>$</span>
                    <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" required />
                  </div>
                  <span class="field-error" id="amountError"></span>
                </div>
                <div class="form-group">
                  <label for="date">Date</label>
                  <input type="date" id="date" required />
                  <span class="field-error" id="dateError"></span>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="category">Category</label>
                  <select id="category" required>
                    <option value="">Select category</option>
                    <option value="Food">🍔 Food</option>
                    <option value="Transport">🚗 Transport</option>
                    <option value="Bills">💡 Bills</option>
                    <option value="Shopping">🛍️ Shopping</option>
                    <option value="Health">🏥 Health</option>
                    <option value="Entertainment">🎬 Entertainment</option>
                    <option value="Salary">💼 Salary</option>
                    <option value="Freelance">💻 Freelance</option>
                    <option value="Investment">📈 Investment</option>
                    <option value="Others">📦 Others</option>
                  </select>
                  <span class="field-error" id="categoryError"></span>
                </div>
                <div class="form-group">
                  <label for="description">Description</label>
                  <input type="text" id="description" placeholder="What was this for?" maxlength="80" />
                </div>
              </div>
              <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Add Transaction
              </button>
            </form>
          </div>

          <!-- Transaction List -->
          <div class="card" id="transactionCard">
            <div class="card-header">
              <h2 class="card-title">Transactions</h2>
              <div class="filter-row">
                <select id="categoryFilter" class="select-input select-sm">
                  <option value="all">All Categories</option>
                  <option value="Food">Food</option>
                  <option value="Transport">Transport</option>
                  <option value="Bills">Bills</option>
                  <option value="Shopping">Shopping</option>
                  <option value="Health">Health</option>
                  <option value="Entertainment">Entertainment</option>
                  <option value="Salary">Salary</option>
                  <option value="Freelance">Freelance</option>
                  <option value="Investment">Investment</option>
                  <option value="Others">Others</option>
                </select>
                <select id="typeFilter" class="select-input select-sm">
                  <option value="all">All Types</option>
                  <option value="income">Income</option>
                  <option value="expense">Expense</option>
                </select>
              </div>
            </div>
            <div id="transactionList" class="transaction-list"></div>
          </div>
        </div>

        <!-- Right Column: Charts -->
        <div class="right-col">
          <div class="card chart-card">
            <div class="card-header">
              <h2 class="card-title">Analytics</h2>
              <div class="chart-tabs">
                <button class="chart-tab active" data-chart="pie">Breakdown</button>
                <button class="chart-tab" data-chart="line">Balance</button>
                <button class="chart-tab" data-chart="bar">Monthly</button>
              </div>
            </div>
            <div class="chart-container">
              <canvas id="pieChart" class="chart-canvas active"></canvas>
              <canvas id="lineChart" class="chart-canvas"></canvas>
              <canvas id="barChart" class="chart-canvas"></canvas>
              <div id="chartEmpty" class="chart-empty hidden">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3">
                  <path d="M18 20V10M12 20V4M6 20v-6"/>
                </svg>
                <p>No data to display yet</p>
              </div>
            </div>
          </div>

          <!-- Category Breakdown Table -->
          <div class="card" id="breakdownCard">
            <div class="card-header">
              <h2 class="card-title">Category Breakdown</h2>
            </div>
            <div id="categoryBreakdown" class="category-breakdown"></div>
          </div>
        </div>
      </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden"></div>

    <!-- Delete Confirm Modal -->
    <div id="modal" class="modal-overlay hidden">
      <div class="modal">
        <h3>Delete Transaction</h3>
        <p>Are you sure you want to delete this transaction? This cannot be undone.</p>
        <div class="modal-actions">
          <button id="modalCancel" class="btn btn-outline">Cancel</button>
          <button id="modalConfirm" class="btn btn-danger">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="src/App.js"></script>
</body>
</html>
